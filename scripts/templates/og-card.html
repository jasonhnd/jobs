<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>OG card source — render via Chrome at 1200x630, screenshot to og.png</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --bg: #FAF6EE;
        --bg-2: #F2EADB;
        --ink: #241E18;
        --muted: #7A6F5E;
        --accent: #D96B3D;
        --sage: #6E9B89;
        --sage-deep: #48705F;
        --serif: "Noto Serif JP", Georgia, serif;
        --sans: "Plus Jakarta Sans", "Hiragino Sans", system-ui, -apple-system, sans-serif;
      }
      html, body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--sans);
        position: relative;
      }

      /* warm geometric background — soft circles + subtle grain feel */
      .bg-deco {
        position: absolute;
        inset: 0;
        overflow: hidden;
        opacity: 0.55;
      }
      .bg-deco::before, .bg-deco::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
      }
      .bg-deco::before {
        width: 520px; height: 520px;
        right: -120px; top: -160px;
        background: radial-gradient(circle, rgba(217,107,61,0.28), rgba(217,107,61,0) 70%);
      }
      .bg-deco::after {
        width: 460px; height: 460px;
        left: -100px; bottom: -180px;
        background: radial-gradient(circle, rgba(110,155,137,0.26), rgba(110,155,137,0) 70%);
      }

      /* very faint paper texture using inline SVG */
      .grain {
        position: absolute; inset: 0;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        mix-blend-mode: multiply;
      }

      .content {
        position: relative;
        z-index: 2;
        padding: 72px 88px 56px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .lockup {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        font-family: var(--sans);
        font-size: 16px;
        color: var(--sage-deep);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 600;
      }
      .lockup::before {
        content: "";
        width: 36px;
        height: 1px;
        background: var(--sage-deep);
      }

      h1 {
        font-family: var(--serif);
        font-size: 92px;
        font-weight: 600;
        line-height: 1.18;
        letter-spacing: -0.012em;
        color: var(--ink);
        margin-top: 28px;
      }
      h1 em {
        color: var(--accent);
        font-style: italic;
        font-weight: 600;
      }

      .sub {
        font-family: var(--sans);
        font-size: 24px;
        color: var(--muted);
        line-height: 1.55;
        max-width: 920px;
        margin-top: 28px;
      }
      .sub b {
        color: var(--ink);
        font-weight: 600;
      }

      .stats {
        display: flex;
        gap: 72px;
        margin-top: 4px;
      }
      .stat-item {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .stat-num {
        font-family: var(--serif);
        font-size: 56px;
        font-weight: 600;
        color: var(--ink);
        line-height: 1;
        letter-spacing: -0.015em;
      }
      .stat-num.accent { color: var(--accent); }
      .stat-num.sage   { color: var(--sage-deep); }
      .stat-num small {
        font-family: var(--sans);
        font-size: 24px;
        opacity: 0.85;
        margin-left: 4px;
        font-weight: 500;
      }
      .stat-label {
        font-family: var(--sans);
        font-size: 15px;
        color: var(--muted);
        letter-spacing: 0.06em;
      }

      .bottom {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid rgba(36, 30, 24, 0.12);
        padding-top: 20px;
        font-family: var(--sans);
        font-size: 17px;
        color: var(--muted);
      }
      .bottom .url-strong {
        color: var(--accent);
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .bottom .by { color: var(--ink); opacity: 0.75; }
    </style>
  </head>
  <body>
    <div class="bg-deco"></div>
    <div class="grain"></div>
    <div class="content">
      <div>
        <span class="lockup">未来の仕事 — Future of Work</span>
        <h1>AIの時代でも、<br><em>あなたらしい</em>働き方を。</h1>
        <p class="sub">
          日本 <b>552 職業</b>を、AI 影響度・就業者数・年収・5 次元プロファイルで多角的に分析。<br>
          新しい道を、いっしょに見つけましょう。
        </p>
      </div>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-num">552</div>
          <div class="stat-label">職業を分析</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">5,449<small>万人</small></div>
          <div class="stat-label">就業者数</div>
        </div>
        <div class="stat-item">
          <div class="stat-num sage">5</div>
          <div class="stat-label">次元プロファイル</div>
        </div>
        <div class="stat-item">
          <div class="stat-num accent">独自</div>
          <div class="stat-label">非公式・独自分析</div>
        </div>
      </div>
      <div class="bottom">
        <span><span class="url-strong">mirai-shigoto.com</span></span>
        <span class="by">出典：厚労省・JILPT「職業情報データベース」 v7.00</span>
      </div>
    </div>
  </body>
</html>
