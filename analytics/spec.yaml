# GA4 Instrumentation Spec — single source of truth
#
# This file defines every custom event, parameter, dimension, and key event
# we send to Google Analytics 4. Run `analytics/setup-ga4.mjs` to apply this
# spec idempotently to the configured GA4 property (see analytics/README.md).
#
# Property:    G-GLDNBDPF13   (mirai-shigoto.com)
#
# Naming conventions:
#   - Event names: snake_case, lowercase, <= 40 chars
#   - Param names: snake_case, lowercase, <= 40 chars
#   - Param string values: <= 100 chars (GA4 truncates beyond this)
#
# After editing this file, re-run `node analytics/setup-ga4.mjs` to sync.

# ----------------------------------------------------------------------
# Events
# ----------------------------------------------------------------------
# Each event is a `gtag('event', name, params)` call from the front end.
# `conversion: true` marks the event as a Key Event (formerly Conversion)
# so it shows up in GA4 conversion reports.

events:
  # ---- Lifecycle & navigation ----
  - name: map_loaded
    description: Treemap finished initial render after data.treemap.json loaded.
    params:
      - { name: language, type: string, desc: "ja or en at time of load" }
      - { name: device_category, type: string, desc: "mobile / tablet / desktop (client-derived)" }
      - { name: tile_count, type: int, desc: "Number of tiles rendered (552 today)" }
    conversion: false

  # `language_switch` — REMOVED 2026-05-06. Was wired to the JA/EN language
  # switcher that v1.4.0 deleted (site is now JA-only, /en/* 301 → /ja/*).
  # Event will never fire again. Historical event data still in GA4 for
  # the prior 14-month retention window. `from_lang` / `to_lang` / `path`
  # parameters are left as global params (used by other events) — not
  # specifically tied to language_switch any more, so no parameter cleanup
  # needed.

  - name: layer_change
    description: User switched the color layer (AI risk / salary / age / etc.)
    params:
      - { name: layer_name, type: string, desc: "ai_risk | salary | age | hours | recruit_ratio | education" }
      - { name: from_layer, type: string }
      - { name: language, type: string }
    conversion: false

  - name: palette_change
    description: User toggled the color palette (default red-green vs colorblind-safe).
    params:
      - { name: palette, type: string, desc: "red_green | viridis (or whatever the toggle exposes)" }
      - { name: language, type: string }
    conversion: false

  # ---- Treemap interaction ----
  - name: occupation_tile_click
    description: |
      User clicked / tapped a tile on the treemap and the per-occupation page
      opened. Fires from canvas click (desktop), touch second-tap (mobile),
      and keyboard Enter/Space, distinguished by `source`. The user immediately
      navigates to /ja/<id> or /en/<id> after this event.
    params:
      - { name: occupation_id, type: int }
      - { name: occupation_name_ja, type: string }
      - { name: occupation_name_en, type: string }
      - { name: ai_risk_score, type: int }
      - { name: risk_tier, type: string, desc: "high (>=7) | mid (5-6) | low (<=4)" }
      - { name: salary, type: int, desc: "Annual salary in 10,000 JPY units" }
      - { name: tile_position_idx, type: int, desc: "0-indexed position in rendered rect list (-1 if not findable)" }
      - { name: source, type: string, desc: "desktop_click | touch_tap | keyboard" }
      - { name: language, type: string }
    conversion: true   # treemap → occupation page is the primary navigation funnel

  - name: tooltip_view
    description: |
      Desktop hover triggered tooltip display (proxy for desktop tile interest).
      Sampled at 10% client-side (Math.random() < 0.10) — full rate would
      dwarf every other event since tooltips fire on every hover. The 10%
      sample is representative for "which occupations attract attention"
      analysis. Multiply tooltip_view counts by 10 when extrapolating to
      total tooltip volume.
    params:
      - { name: occupation_id, type: int }
      - { name: ai_risk_score, type: int }
      - { name: language, type: string }
    conversion: false   # signal-only, not a conversion goal

  # `search_used` — REMOVED 2026-05-02. Was deprecated, never emitted; replaced
  # entirely by `job_search_submit` (which logs the query text). Removing from
  # spec so check_spec_vs_code.mjs doesn't flag it as a missing emit.

  # P0-A (2026-05-06): `job_search_submit` was renamed to `job_search_typed` and
  # demoted from a Key Event. Reason: it fired on every typing-pause and conflated
  # two distinct user intents — visual filter ("typed 医 to dim non-medical tiles")
  # vs navigate ("typed 看護師 to open that page"). The CTR denominator was
  # polluted by filter-only users, making job_search_navigate / job_search_submit
  # = 22% unusable as a real search-CTR. The new `job_search_intent` event
  # captures only navigate-style engagement. See CHANGELOG 2026-05-06.

  - name: job_search_typed
    description: |
      User typed in the treemap search box and paused (800 ms idle). Fires
      once per distinct query — backspacing back to a previously tracked
      query does not re-fire. Only fires when the trimmed query is non-empty.
      Use this to surface popular queries / dataset coverage gaps. Do NOT
      use it as a CTR denominator — it includes visual-filter users who
      never intended to navigate. Use `job_search_intent` for CTR instead.
    params:
      - { name: query, type: string, desc: "Trimmed query, truncated to 100 chars (GA4 string-param max)" }
      - { name: match_count, type: int, desc: "Number of tiles matching the query at fire time. 0 = no results — useful for finding gaps in the dataset." }
      - { name: language, type: string }
    conversion: false   # demoted from KPI — see job_search_intent for the new CTR denominator

  - name: job_search_intent
    description: |
      User showed clear intent to navigate from the search box (not just
      visual-filter intent). Fires from one of four triggers, deduped per
      distinct query so the same query produces at most one intent event:
        1. Form submit (Enter on input or click "AI 影響度をチェック" /
           "診断" button), regardless of whether a match was found.
        2. ArrowDown / ArrowUp pressed inside the autocomplete dropdown.
        3. Mouse hover over an autocomplete suggestion ≥ 500 ms.
        4. Mousedown / touchstart on an autocomplete suggestion.
      Real search-CTR = job_search_navigate / job_search_intent. Stays close
      to 100% when the autocomplete UX is good; drops when users engage but
      can't find / don't commit.
    params:
      - { name: query, type: string, desc: "Trimmed query, truncated to 100 chars" }
      - { name: intent_source, type: string, desc: "submit | arrow_keys | hover | click" }
      - { name: language, type: string }
    conversion: true   # KPI #1 (replaces the former job_search_submit role)

  - name: popular_job_click
    description: |
      User clicked one of the 5 hero chips (mobile §7.11 or desktop §7.12).
      Replaces the older `chip_click` event. Fires from `navigateToJob(rec, "chip")`
      and immediately navigates to the mapped occupation page (`CHIP_TO_JOB`).
    params:
      - { name: occupation_id, type: int }
      - { name: occupation_name_ja, type: string }
      - { name: occupation_name_en, type: string }
      - { name: ai_risk_score, type: int }
      - { name: language, type: string }
      - { name: source, type: string, desc: "always 'chip' — kept as a param so dashboards can union with job_search_navigate for total navigation volume" }
    conversion: true   # primary chip → occupation funnel

  - name: job_search_navigate
    description: |
      User triggered a navigation from the search field — Enter key on the
      input, click of the「AI 影響度をチェック」button, click on a
      `.search-suggest` dropdown item, or keyboard Enter on a focused
      suggest item. All four paths land on the same `/ja/<id>` or `/en/<id>`
      via `navigateToJob(rec, source)`.
    params:
      - { name: occupation_id, type: int }
      - { name: occupation_name_ja, type: string }
      - { name: occupation_name_en, type: string }
      - { name: ai_risk_score, type: int }
      - { name: language, type: string }
      - { name: source, type: string, desc: "search_submit | suggest_click | suggest_keyboard" }
    conversion: true   # primary search → occupation funnel

  # ---- Modal lifecycle — REMOVED 2026-05-02 ----
  # `occupation_modal_open`, `modal_close`, `report_cta_click` were the
  # Phase-0 modal funnel. Stage 1 replaced the modal with dedicated
  # /ja/<id> + /en/<id> pages, so these events have no emit site any
  # more. Their successors are `result_view` (page load) + `tooltip_cta_click`
  # (mobile entry from treemap tooltip).

  - name: tooltip_cta_click
    description: User tapped the "詳細を見る →" / "View details →" CTA inside the mobile touch-mode tooltip. The explicit funnel from treemap tile → occupation detail page (Design.md §6.6).
    params:
      - { name: occupation_id, type: int }
      - { name: ai_risk_score, type: int }
      - { name: risk_tier, type: string }
      - { name: language, type: string }
    conversion: false   # not a key event yet — observe a few weeks before promoting

  - name: tile_double_tap_open
    description: User double-tapped a tile on mobile to open the occupation detail page directly (the legacy "shortcut" path, kept alongside the explicit CTA so power users still have a fast option). Lets us A/B the funnel between the visible CTA and the hidden double-tap shortcut.
    params:
      - { name: occupation_id, type: int }
      - { name: ai_risk_score, type: int }
      - { name: language, type: string }
    conversion: false

  # `chip_click` was the original event for mobile-hero chip taps when chips
  # filtered the treemap. As of Stage 1 (2026-05-02) chips do 1-step direct
  # navigation via CHIP_TO_JOB, so this event was replaced by
  # `popular_job_click` above. Removed from spec — no event currently fires
  # under this name in the production codebase.

  - name: result_view
    description: |
      Per-occupation page view. Fires synchronously on page load from the
      generated /ja/<id>.html and /en/<id>.html pages. Distinct from GA4's
      auto-fired page_view because the parameters are typed (occupation_id,
      ai_risk_score, risk_tier) — page_view only carries the URL.
    params:
      - { name: occupation_id, type: int }
      - { name: ai_risk_score, type: int }
      - { name: risk_tier, type: string, desc: "high (>=7) | mid (5-6) | low (<=4)" }
      - { name: language, type: string }
    conversion: true   # Yaku's推广方案 KPI #3 — promote to Key Event

  - name: jobtag_outbound_click
    description: |
      User clicked the "出典 / 厚生労働省 job tag" link in the source-row of a
      per-occupation page, navigating away to the MHLW jobtag site. Used to
      measure flow of users who chose to verify against / continue at the
      official source after consuming our analysis. Compliance-relevant —
      proves the attribution chain ja/<id> → MHLW is being used. Wired in
      scripts/build_occupations.py via inline onclick gtag('event', ...).
    params:
      - { name: occupation_id, type: int }
      - { name: ai_risk_score, type: int }
      - { name: language, type: string }
    conversion: false   # informational, not a primary conversion goal

  # ---- Email capture ----
  # `email_submit_modal` — REMOVED 2026-05-02 along with the modal itself.
  # When per-occupation pages add their own subscribe form, register a new
  # event (e.g. `email_submit_occ`) rather than reviving this one — the
  # modal-specific risk_tier semantics no longer apply.
  - name: email_submit_header
    description: Email submitted from the page-bottom generic newsletter card (T1 in OPC plan).
    params:
      - { name: language, type: string }
      - { name: success, type: string }
      - { name: error_reason, type: string }
    conversion: true   # QI 3
    unimplemented: planned   # newsletter card not yet on the page; spec entry kept so we don't forget the QI when it lands

  # ---- Feedback ----
  - name: feedback_submit
    description: User submitted the bottom-of-page feedback form.
    params:
      - { name: selected_options, type: string, desc: "Comma-joined option keys (b2c_career,b2b_hr,...)" }
      - { name: freetext_length, type: int, desc: "Char count of free-text answer (text itself NOT logged)" }
      - { name: has_email, type: string, desc: "true | false (whether user attached email)" }
      - { name: language, type: string }
    conversion: true   # QI 8 — highest unit value
    unimplemented: planned   # api/feedback.js endpoint exists but no UI form calls it yet

  # ---- Sharing ----
  # `share_x_click` was per-platform — replaced 2026-05-02 by the unified
  # `share_click` event below, which carries `platform` as a param so all
  # share platforms feed one event with consistent UTM contracts.
  - name: share_click
    description: |
      User clicked any share button (X, LINE, Hatena, LinkedIn, Facebook,
      Copy, Native). Fires from both the home-page footer and from the
      1,104 occupation detail pages. URL embeds UTM params per
      Design.md §7.13.
    params:
      - { name: platform, type: string, desc: "x | line | hatena | linkedin | facebook | copy | native" }
      - { name: language, type: string }
      - { name: occupation_id, type: int, desc: "Set on occupation pages, 0 on home page." }
    conversion: false

  # ---- Follow ----
  - name: x_follow_click
    description: |
      User clicked the orange「X でフォローする」CTA in the unified footer
      (Design.md §7.13). Lives on the home page and on every occupation
      detail page; on detail pages the `occupation_id` carries the page's id
      so we can attribute follows to specific high-engagement occupations.
    params:
      - { name: language, type: string }
      - { name: occupation_id, type: int, desc: "Set on occupation pages, 0 on home page." }
    conversion: false   # observe a few weeks before promoting

  # ---- Theme (light/dark) ----
  - name: theme_change
    description: User toggled the light/dark theme via the round button next to the language switcher.
    params:
      - { name: from, type: string, desc: "previous theme — 'light' | 'dark'" }
      - { name: to, type: string, desc: "next theme — 'light' | 'dark'" }
      - { name: was_explicit, type: string, desc: "true if user already had an explicit choice in localStorage; false if first toggle from system default" }
      - { name: system_pref, type: string, desc: "browser-reported prefers-color-scheme — 'light' | 'dark'" }
    conversion: false

# ----------------------------------------------------------------------
# Custom Dimensions — event-scoped
# ----------------------------------------------------------------------
# Every event parameter we want to GROUP BY in standard reports must be
# registered as a custom dimension. Built-in dimensions (utm_source,
# session_source, page_path, country, etc.) do NOT need to be registered.

event_scoped_dimensions:
  - parameter_name: occupation_id
    display_name: Occupation ID
    description: Numeric ID matching jobtag (1..580).

  - parameter_name: occupation_name_ja
    display_name: Occupation JA
    description: Japanese occupation title from data.treemap.json.

  - parameter_name: occupation_name_en
    display_name: Occupation EN
    description: English occupation title from data.treemap.json.

  - parameter_name: ai_risk_score
    display_name: AI Risk Score
    description: 0–10 LLM-scored AI exposure for the occupation.

  - parameter_name: risk_tier
    display_name: Risk Tier
    description: Bucketed AI risk (high >=7, mid 5-6, low <=4).

  - parameter_name: salary
    display_name: Annual Salary
    description: Annual salary in 10,000 JPY units (manyen).

  - parameter_name: layer_name
    display_name: Layer Name
    description: Active color layer at time of event.

  # `open_method` / `close_method` — REMOVED 2026-05-06 from spec. They were
  # introduced for the modal lifecycle (occupation_modal_open / modal_close)
  # which was deleted 2026-05-02. The dimensions still exist on the live GA4
  # property to preserve historical data; we just don't sync them anymore.

  - parameter_name: selected_options
    display_name: Feedback Selected Options
    description: Comma-joined feedback option keys.

  - parameter_name: has_email
    display_name: Feedback Has Email
    description: Whether the feedback form included an email.

  - parameter_name: error_reason
    display_name: Submit Error Reason
    description: Error code when an email/feedback submit failed.

  - parameter_name: from_modal
    display_name: From Modal
    description: Whether an outbound click came from the modal vs elsewhere.

  - parameter_name: tile_position_idx
    display_name: Tile Position Index
    description: 0-indexed rendered position of the clicked tile (proxy for prominence).

  - parameter_name: source
    display_name: Navigation Source
    description: How user arrived at navigation. Values include desktop_click, touch_tap, keyboard, chip, search_submit, suggest_click, suggest_keyboard.

  - parameter_name: query
    display_name: Search Query
    description: Trimmed query string the user typed into the treemap search box (max 100 chars). Used to surface most-searched occupation terms.

  - parameter_name: match_count
    display_name: Search Match Count
    description: Number of treemap tiles matching the query at fire time. 0 = surfaces dataset gaps (terms users want that we don't cover).

  - parameter_name: intent_source
    display_name: Search Intent Source
    description: How job_search_intent was triggered. Values - submit, arrow_keys, hover, click. Lets dashboards split keyboard vs mouse vs touch engagement.

  - parameter_name: platform
    display_name: Share Platform
    description: Which share platform the user picked. `x | line | hatena | linkedin | facebook | copy | native`. Used by `share_click`.

  - parameter_name: device_category
    display_name: Device Category
    description: Client-derived `mobile | tablet | desktop` at `map_loaded` time. Lets reports split by device without relying on GA4's noisy auto-derivation.

  - parameter_name: tile_count
    display_name: Tile Count Rendered
    description: Number of tiles drawn at initial treemap render (552 today). Surfaces dataset growth and partial-render anomalies.

  - parameter_name: from_layer
    display_name: Layer Switch Source
    description: Previously active color layer at the moment of a `layer_change` (paired with `layer_name` which is the new value).

  # `time_open_ms` — REMOVED 2026-05-06 from spec (same reason as
  # open_method / close_method above). Live GA4 dimension preserved for history.

  - parameter_name: freetext_length
    display_name: Feedback Freetext Length
    description: Character count of the free-text feedback field. The text itself is NOT logged (PII risk) — only the length, as a proxy for thoughtfulness.

  - parameter_name: success
    display_name: Submit Success
    description: Whether the submit succeeded (true/false).

  - parameter_name: palette
    display_name: Color Palette
    description: Active color palette at time of event.

  # ---- theme_change params ----
  - parameter_name: from
    display_name: Theme From
    description: Previous theme before user toggled (light / dark). Used by event `theme_change`.

  - parameter_name: to
    display_name: Theme To
    description: Next theme after user toggled (light / dark). Used by event `theme_change`.

  - parameter_name: was_explicit
    display_name: Theme Was Explicit
    description: "true if user already had an explicit choice in localStorage; false on first toggle from system default."

  - parameter_name: system_pref
    display_name: System Color Preference
    description: Browser-reported `prefers-color-scheme` at the moment of the toggle (light / dark).

# ----------------------------------------------------------------------
# Custom Dimensions — user-scoped (persist across sessions)
# ----------------------------------------------------------------------

user_scoped_dimensions:
  - parameter_name: language_preference
    display_name: Language Preference
    description: User's language at time of first session (ja / en).

  - parameter_name: is_subscribed
    display_name: Is Subscribed
    description: Whether the user has ever submitted an email (true/false).

  - parameter_name: subscribed_occupation_id
    display_name: Subscribed Occupation ID
    description: Occupation_id captured at the moment of email submit (if any).

  - parameter_name: has_submitted_feedback
    display_name: Has Submitted Feedback
    description: Whether the user has ever submitted a feedback form (true/false).

# ----------------------------------------------------------------------
# Key Events (formerly "conversions")
# ----------------------------------------------------------------------
# These are auto-derived from `events[].conversion: true`. Listed here
# explicitly for visibility.

key_events:
  # — Funnel: arrival → occupation page —
  - occupation_tile_click   # treemap tile → /ja/<id> or /en/<id>
  - popular_job_click       # hero chip → /ja/<id> or /en/<id> (Stage 1)
  - job_search_intent       # user engaged with autocomplete (KPI #1, real CTR denominator since 2026-05-06)
  - job_search_navigate     # search input Enter / suggest click → /ja/<id> (Stage 1)
  - result_view             # /ja/<id> or /en/<id> page-view fired with typed params (Stage 1, KPI #3)
  - email_submit_header     # newsletter card submit (QI 3); spec entry exists, UI not yet wired (unimplemented:planned)
  # — Conversion: occupation page → operator inbox —
  - feedback_submit         # QI 8 (feedback + tagging)
  # NOTE: `email_submit_modal` and `report_cta_click` were removed in 2026-05-02
  # along with the modal itself. `email_submit_header` is still in events: but
  # marked `unimplemented: planned` — promote it back here when the newsletter
  # card lands on the page. `job_search_submit` was renamed to `job_search_typed`
  # and demoted from key_events on 2026-05-06 (see events: section).

# ----------------------------------------------------------------------
# Audiences — created MANUALLY in the GA4 dashboard
# ----------------------------------------------------------------------
# Audience definitions in the Admin API are very complex JSON; for v1 of
# the OPC validation we create them by clicking through the dashboard.
# This block documents what to create and the rough filter logic.

audiences_manual:
  - name: Subscribed
    description: User has submitted an email at least once.
    filter: "event_count of (email_submit_modal OR email_submit_header) >= 1"
    membership_duration_days: 540  # max in GA4

  - name: Engaged but unconverted
    description: Opened modal but never submitted email (in last 30 days).
    filter: "occupation_modal_open >= 1 AND email_submit_modal = 0 AND email_submit_header = 0"
    membership_duration_days: 30

  - name: B2B signal
    description: Submitted feedback that includes a B2B option.
    filter: "feedback_submit where selected_options contains 'b2b_hr' OR 'b2b_training'"
    membership_duration_days: 540

  - name: High-intent occupations
    description: Opened a high-risk modal (proxy for high anxiety).
    filter: "occupation_modal_open where risk_tier = 'high'"
    membership_duration_days: 90

  - name: Returning visitors
    description: Came back for a second session within 28 days. (GA4 has built-in similar — optional.)
    filter: "session_start >= 2 in 28 days"
    membership_duration_days: 28
