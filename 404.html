<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>移転しました — mirai-shigoto.com</title>
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://mirai-shigoto.com/" />
    <meta http-equiv="refresh" content="0; url=https://mirai-shigoto.com/" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: #0b0d10;
        color: #e9eef5;
        margin: 0;
        padding: 6em 1.5em;
        text-align: center;
        line-height: 1.7;
      }
      a { color: #ffb84d; text-decoration: none; }
      a:hover { text-decoration: underline; }
      p { margin: 0 0 0.5em; font-size: 0.95rem; }
      .small { color: #8a93a3; font-size: 0.8rem; margin-top: 1.5em; }
    </style>
  </head>
  <body>
    <p>このページは <a href="https://mirai-shigoto.com/" id="link">mirai-shigoto.com</a> へ移転しました。</p>
    <p>This page has moved to <a href="https://mirai-shigoto.com/">mirai-shigoto.com</a>.</p>
    <p class="small">自動的に転送されます… / Redirecting…</p>
    <script>
      (function () {
        // Strip the project-pages prefix (/jobs) and forward path + query + hash.
        var path = location.pathname.replace(/^\/jobs/, "");
        if (!path || path === "/") path = "/";
        var target = "https://mirai-shigoto.com" + path + location.search + location.hash;
        var link = document.getElementById("link");
        if (link) link.href = target;
        location.replace(target);
      })();
    </script>
  </body>
</html>
